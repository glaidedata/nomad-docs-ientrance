site_name: "iEntrance NOMAD Oasis"
site_description: |
  iEntrance Data Management Tutorial for NOMAD Users
site_author: Galide Data GmbH
repo_url: ""
edit_uri: ""

nav:
  - Home: index.md
  #- Tutorial: 
  #  - Overview: tutorial.md
  #- Maintenance Guide: how_to.md

plugins:
 - search

theme:
  name: material
  custom_dir: docs/theme
  palette:
    primary: '#2A4CDF'
    accent: '#008A67'
  font:
    text: 'Titillium Web'
  logo: assets/nomad-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.buttons
  prev_next_buttons_location: both

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: True
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - mkdocs-click
  - pymdownx.extra

extra:
  generator: false
  homepage: https://oasis.ientrance.eu/nomad-oasis/gui/about/information
  icon:
    repo: fontawesome/brands/github
  footer: |
    Initial documentation by Glaide Data GmbH · Apache 2.0 License.

use_directory_urls: false

extra_css:
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
